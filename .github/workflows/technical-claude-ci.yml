name: Technical Claude CI

on:
  push:
    branches:
      - master
    paths:
      - "technical_claude/**"
  pull_request:
    branches:
      - master
    paths:
      - "technical_claude/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: technical_claude

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff .

      - name: Tests
        run: |
          pip install pytest
          pytest