name: Technical Claude PR Review

on:
  pull_request:
    branches:
      - master
    paths:
      - "technical_claude/**"

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get diff
        run: |
          git fetch origin master
          git diff origin/master...HEAD > diff.txt

      - name: Claude Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python technical_claude/scripts/review_diff.py diff.txt