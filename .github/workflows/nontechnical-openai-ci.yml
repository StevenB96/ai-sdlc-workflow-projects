name: Non Technical OpenAI CI

on:
  push:
    branches:
      - master
    paths:
      - "non_technical_openai/**"
  pull_request:
    branches:
      - master
    paths:
      - "non_technical_openai/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: non_technical_openai

    steps:
      - uses: actions/checkout@v4

      - name: Validate files
        run: |
          echo "Checking workflow files"
          ls -R