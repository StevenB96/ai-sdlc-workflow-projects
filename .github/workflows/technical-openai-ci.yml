name: Technical OpenAI CI

on:
  push:
    branches:
      - master
    paths:
      - "technical_openai/**"
  pull_request:
    branches:
      - master
    paths:
      - "technical_openai/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Ensure Node.js 24 for JS actions

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: technical_openai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint code
        run: |
          pip install ruff
          ruff .

      - name: Run tests
        run: |
          pip install pytest
          pytest

      - name: Start API for health check
        run: |
          pip install uvicorn
          uvicorn app.main:app &
          sleep 5

      - name: Health check
        run: curl http://localhost:8000/health