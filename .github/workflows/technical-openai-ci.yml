name: Technical OpenAI CI

on:
  push:
    branches:
      - master
    paths:
      - "technical_openai/**"

  pull_request:
    branches:
      - master
    paths:
      - "technical_openai/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: technical_openai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pip install pytest
          pytest

      - name: Start API
        run: |
          pip install uvicorn
          uvicorn app.main:app &
          sleep 5

      - name: Health check
        run: |
          curl http://localhost:8000/health