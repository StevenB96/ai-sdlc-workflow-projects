name: Technical OpenAI PR Review

on:
  pull_request:
    branches:
      - master
    paths:
      - "technical_openai/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Ensure Node.js 24 for JS actions

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          git fetch origin master
          git diff origin/master...HEAD > diff.txt

      - name: AI Code Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python technical_openai/scripts/review_diff.py diff.txt